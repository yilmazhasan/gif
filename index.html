<!DOCTYPE html>

<html>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        margin: 0;
        padding: 20px;
    }

    h3 {
        color: #333;
    }

    .vstack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }

    .hstack {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 15px;
    }

    label {
        margin-top: 10px;
        font-weight: bold;
    }

    select,
    input[type="range"] {
        margin-top: 5px;
        padding: 5px;
        width: 200px;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        background-color: #007BFF;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }

    #result {
        margin-top: 20px;
        border: 1px solid #ccc;
        background-color: white;
        min-width: 100px;
        min-height: 100px;
        text-align: center;
        align-content: center;
        width: auto;
        height: auto;
    }

    /* Container needed to position the button. Adjust the width as needed */
    .container {
        position: relative;
        width: 50%;
    }

    /* Make the image responsive */
    .container img {
        width: 100px;
        height: auto;
        position: relative;
    }

    /* Style the button and place it in the middle of the container/image */
    .container .btn {
        position: absolute;
        top: 0;
        transform: translate(-50%, -50%);
        -ms-transform: translate(-50%, -50%);
        background-color: transparent;
        color: #999;
        font-size: 16px;
        padding: 12px 24px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        opacity: 0.8;
    }

    .container .btn:hover {
        color: red;
        opacity: 1;
    }
</style>


<head>
    <script src="gif.js" type="text/javascript"></script>
    <script src="gif.worker.js" type="text/javascript"></script>
    <!--Include map files gif.js.map -->
</head>


<h3>GIF Maker</h3>

<div class="vstack">
    <!-- Add a slider for gif delay -->
    <div class="hstack">
        <div class="vstack">
            <label for="delay">Delay:</label>
            <span id="delayValue">500</span> ms
            <input type="range" onchange="speedChanged()" id="delay" name="delay" min="200" max="2000" value="700">
        </div>

        <div class="vstack">
            <label for="gifSize">GIF Size:</label>
            <select id="gifSize" name="gifSize" onchange="sizeChanged()">
                <option value="200">Small (200x200)</option>
                <option value="500" selected>Medium (500x500)</option>
                <option value="800">Large (800x800)</option>
                <option value="1200">X-Large (1200x1200)</option>
                <option value="1600">XX-Large (1600x1600)</option>
            </select>
        </div>
    </div>

    <div class="vstack">
        <h3>Images:</h3>
        <input type="file" id="imageUpload" multiple accept="image/*" onchange="handleImageUpload(event)">
        <div id="images" class="hstack">
        </div>
    </div>

    <button onclick="downloadGif()"> Download GIF </button>
    <button onclick="makeGif()"> Rerender GIF </button>
    <h3>Preview:</h3>
    <img id="result" src="" alt="Loading..." />
</div>

</html>

<script>

    // Settings
    let delay = 800;
    let gifWidth = 0;
    let gifHeight = 0;

    function getHtmlElementForImage(src) {
        const div = document.createElement('div');
        div.className = 'container';
        const img = document.createElement('img');
        img.src = src;
        img.alt = 'Image';
        const button = document.createElement('button');
        button.className = 'btn';
        button.innerText = 'X';
        button.onclick = function () {
            div.remove();
        }
        div.appendChild(img);
        div.appendChild(button);
        return div;
    }

    function setGifSize(files) {
        gifWidth = 500;
        gifHeight = 500;
    }

    function handleImageUpload(event) {
        const files = event.target.files;

        const imagesDiv = document.getElementById('images');
        // imagesDiv.innerHTML = ''; // Clear previous images

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const fileURI = URL.createObjectURL(file);

            // Save file to local files to get a file path
            const div = getHtmlElementForImage(fileURI);

            imagesDiv.appendChild(div);
        }

        setGifSize(files);
    }

    function sizeChanged() {
        clearGif();
        gifSize = document.getElementById('gifSize').value;
        makeGif();
    }

    function speedChanged() {
        clearGif();
        delay = parseInt(document.getElementById('delay').value);
        document.getElementById('delayValue').innerText = delay;
        makeGif();
    }

    function downloadGif() {
        const img = document.getElementById('result');
        const url = img.src;
        const a = document.createElement('a');
        a.href = url;
        a.download = 'myGif.gif';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function clearGif() {
        const img = document.getElementById('result');
        img.src = 'Loading...';
    }

    function makeGif() {

        console.log(gifWidth, gifHeight)

        const gif = new GIF({
            workers: 2,
            quality: 5,
            width: gifWidth,
            height: gifHeight
        });

        const imagesDiv = document.getElementById('images');
        const imageURIs = [];

        imagesDiv.childNodes.forEach((child) => {
            if (child.className === 'container') {
                const imgSrc = child.querySelector('img').src;
                imageURIs.push(imgSrc);
            }
        });

        imageURIs.forEach((imgURI) => {
            console.log(`Adding image: ${imgURI}`);
            const img = new Image();
            img.src = imgURI;

            gif.addFrame(img, { delay: delay })
        })

        gif.on("finished", (blob) => {
            const url = URL.createObjectURL(blob);
            document.getElementById('result').src = url;
        });

        gif.render();
    }

</script>
