<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIF Maker</title>
    <script src="https://cdn.jsdelivr.net/npm/gif.js/dist/gif.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 24px;
        color: #333;
      }

      h1 {
        font-size: 20px;
        margin-bottom: 20px;
      }

      .section {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
      }

      .section-title {
        font-weight: bold;
        margin-bottom: 12px;
        font-size: 12px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .controls-row {
        display: flex;
        gap: 24px;
        align-items: flex-end;
        flex-wrap: wrap;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .control-group label {
        font-size: 13px;
        color: #555;
      }

      select,
      input[type="number"] {
        padding: 6px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        background: white;
      }

      .upload-label {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 2px dashed #ccc;
        border-radius: 6px;
        padding: 18px;
        cursor: pointer;
        color: #007bff;
        font-size: 14px;
        transition:
          border-color 0.15s,
          background 0.15s;
        user-select: none;
      }

      .upload-label:hover {
        border-color: #007bff;
        background: #f0f7ff;
      }

      #imageUpload {
        display: none;
      }

      .frame-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 12px;
      }

      .frame-card {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #fafafa;
        border: 1px solid #eee;
        border-top: 2px solid transparent;
        border-radius: 6px;
        padding: 8px 12px;
        cursor: grab;
      }

      .frame-card.dragging {
        opacity: 0.4;
      }

      .frame-card.drag-over {
        border-top-color: #007bff;
      }

      .drag-handle {
        color: #bbb;
        font-size: 14px;
        flex-shrink: 0;
        cursor: grab;
      }

      .frame-index {
        font-size: 12px;
        color: #aaa;
        min-width: 18px;
        text-align: right;
      }

      .frame-thumb {
        width: 72px;
        height: 54px;
        object-fit: contain;
        background: #e8e8e8;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .frame-name {
        flex: 1;
        font-size: 12px;
        color: #777;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }

      .frame-delay {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #555;
        flex-shrink: 0;
      }

      .frame-delay input {
        width: 72px;
      }

      .frame-actions {
        display: flex;
        gap: 3px;
        flex-shrink: 0;
      }

      button {
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.15s;
      }

      button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .btn-primary {
        background: #007bff;
        color: white;
      }
      .btn-primary:hover:not(:disabled) {
        background: #0056b3;
      }

      .btn-secondary {
        background: #6c757d;
        color: white;
      }
      .btn-secondary:hover:not(:disabled) {
        background: #545b62;
      }

      .btn-icon {
        background: #efefef;
        color: #444;
        padding: 4px 8px;
        font-size: 13px;
      }

      .btn-icon:hover:not(:disabled) {
        background: #ddd;
      }

      .btn-remove {
        background: transparent;
        color: #cc2200;
        padding: 4px 8px;
        font-size: 15px;
        line-height: 1;
      }

      .btn-remove:hover {
        background: #ffeaea;
        border-radius: 4px;
      }

      .action-row {
        display: flex;
        gap: 10px;
      }

      .frames-toolbar {
        display: flex;
        gap: 10px;
        align-items: stretch;
      }

      .frames-toolbar .upload-label {
        flex: 1;
      }

      .status {
        font-size: 13px;
        padding: 8px 12px;
        border-radius: 4px;
        margin-top: 10px;
      }

      .status.info {
        background: #e8f4fd;
        color: #005fa3;
      }
      .status.success {
        background: #e6f4e6;
        color: #246024;
      }
      .status.warning {
        background: #fff8e1;
        color: #7a5c00;
      }
      .status.error {
        background: #fdecea;
        color: #a81010;
      }
      .status.hidden {
        display: none;
      }

      #previewContainer img {
        max-width: 100%;
        display: block;
        border-radius: 4px;
      }

      .empty-preview {
        color: #bbb;
        font-size: 14px;
        text-align: center;
        padding: 48px 0;
      }

      @media (max-width: 600px) {
        body {
          padding: 12px;
        }

        .controls-row {
          gap: 12px 20px;
        }

        .action-row {
          flex-wrap: wrap;
        }

        .action-row button {
          flex: 1 1 auto;
        }

        button {
          padding: 10px 16px;
        }

        .frames-toolbar {
          flex-wrap: wrap;
        }

        .frame-card {
          flex-wrap: wrap;
          gap: 8px 12px;
        }

        .frame-name {
          flex-basis: 100%;
          order: 1;
        }

        .frame-delay {
          order: 2;
        }

        .frame-actions {
          order: 3;
          margin-left: auto;
        }

        .btn-icon,
        .btn-remove {
          padding: 8px 10px;
        }
      }
    </style>
  </head>
  <body>
    <h1>GIF Maker</h1>

    <div class="section">
      <div class="section-title">Settings</div>
      <div class="controls-row">
        <div class="control-group">
          <label for="gifSize">Output size (max dimension)</label>
          <select id="gifSize">
            <option value="300">Small — 300 px</option>
            <option value="600" selected>Medium — 600 px</option>
            <option value="900">Large — 900 px</option>
            <option value="1200">X-Large — 1200 px</option>
          </select>
        </div>
        <div class="control-group">
          <label for="defaultDelay">Default delay (ms)</label>
          <input
            type="number"
            id="defaultDelay"
            min="10"
            max="60000"
            value="500"
            style="width: 100px"
          />
        </div>
        <div class="control-group">
          <label for="ratioTolerance">Ratio tolerance (%)</label>
          <input
            type="number"
            id="ratioTolerance"
            min="0"
            max="100"
            value="10"
            style="width: 100px"
          />
        </div>
        <div class="control-group" id="fitModeGroup">
          <label for="fitMode">Mismatched ratio handling</label>
          <select id="fitMode">
            <option value="crop" selected>Crop to fit</option>
            <option value="pad">Pad with background</option>
          </select>
        </div>
        <div class="control-group" id="padColorGroup">
          <label for="padColor">Pad background</label>
          <select id="padColor">
            <option value="#ffffff" selected>White</option>
            <option value="#000000">Black</option>
            <option value="custom">Custom color</option>
          </select>
        </div>
        <div class="control-group" id="customPadColorGroup">
          <label for="customPadColor">Custom color</label>
          <input type="color" id="customPadColor" value="#ffffff" />
        </div>
        <div class="control-group">
          <label for="repeatMode">Repeat</label>
          <select id="repeatMode">
            <option value="0" selected>Loop forever</option>
            <option value="-1">Play once</option>
            <option value="custom">Custom count</option>
          </select>
        </div>
        <div class="control-group" id="repeatCountGroup">
          <label for="repeatCount">Repeat count (after first play)</label>
          <input
            type="number"
            id="repeatCount"
            min="0"
            max="1000"
            value="1"
            style="width: 100px"
          />
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Frames</div>
      <div class="frames-toolbar">
        <label class="upload-label" for="imageUpload">+ Add images</label>
        <input type="file" id="imageUpload" multiple accept="image/*" />
        <button
          class="btn-secondary"
          id="clearAllBtn"
          onclick="clearAllFrames()"
          disabled
        >
          Clear all
        </button>
      </div>
      <div id="frameList" class="frame-list"></div>
      <div id="statusMsg" class="status hidden"></div>
    </div>

    <div class="section">
      <div class="action-row">
        <button class="btn-primary" onclick="makeGif()">Render GIF</button>
        <button class="btn-secondary" onclick="downloadGif()">
          Download GIF
        </button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Preview</div>
      <div id="previewContainer">
        <div class="empty-preview">No GIF rendered yet</div>
      </div>
    </div>

    <script>
      // Fetched lazily so file:// pages work without a local gif.worker.js
      let workerBlobUrl = null;
      async function getWorkerBlobUrl() {
        if (workerBlobUrl) return workerBlobUrl;
        const resp = await fetch(
          "https://cdn.jsdelivr.net/npm/gif.js/dist/gif.worker.js"
        );
        if (!resp.ok) throw new Error("Failed to fetch GIF worker script");
        const text = await resp.text();
        workerBlobUrl = URL.createObjectURL(
          new Blob([text], { type: "application/javascript" })
        );
        return workerBlobUrl;
      }

      let frames = []; // { src, delay, name, customDelay }
      let detectedRatio = null; // width/height of first accepted image
      let gifBlobUrl = null;

      document
        .getElementById("imageUpload")
        .addEventListener("change", handleImageUpload);

      document
        .getElementById("defaultDelay")
        .addEventListener("change", handleDefaultDelayChange);

      document
        .getElementById("ratioTolerance")
        .addEventListener("change", updateFitModeVisibility);

      document
        .getElementById("fitMode")
        .addEventListener("change", updateFitModeVisibility);

      document
        .getElementById("padColor")
        .addEventListener("change", updateFitModeVisibility);

      document
        .getElementById("repeatMode")
        .addEventListener("change", updateRepeatVisibility);

      updateFitModeVisibility();
      updateRepeatVisibility();

      function updateRepeatVisibility() {
        const showCustom =
          document.getElementById("repeatMode").value === "custom";
        document.getElementById("repeatCountGroup").style.display = showCustom
          ? ""
          : "none";
      }

      function getRepeat() {
        const mode = document.getElementById("repeatMode").value;
        if (mode === "custom") {
          return Math.max(
            0,
            parseInt(document.getElementById("repeatCount").value) || 0
          );
        }
        return parseInt(mode);
      }

      function getPadColor() {
        const select = document.getElementById("padColor");
        return select.value === "custom"
          ? document.getElementById("customPadColor").value
          : select.value;
      }

      function getRatioTolerance() {
        const pct = Math.min(
          100,
          Math.max(0, parseFloat(document.getElementById("ratioTolerance").value) || 0)
        );
        return pct / 100;
      }

      function updateFitModeVisibility() {
        const showFitMode = getRatioTolerance() > 0;
        document.getElementById("fitModeGroup").style.display = showFitMode
          ? ""
          : "none";
        const showPadColor =
          showFitMode && document.getElementById("fitMode").value === "pad";
        document.getElementById("padColorGroup").style.display = showPadColor
          ? ""
          : "none";

        const showCustomColor =
          showPadColor && document.getElementById("padColor").value === "custom";
        document.getElementById("customPadColorGroup").style.display =
          showCustomColor ? "" : "none";
      }

      function handleDefaultDelayChange() {
        const input = document.getElementById("defaultDelay");
        const value = Math.max(10, parseInt(input.value) || 500);
        input.value = value;
        frames.forEach((frame) => {
          if (!frame.customDelay) frame.delay = value;
        });
        renderFrameList();
      }

      function sameRatio(r1, r2) {
        return Math.abs(r1 - r2) / r1 <= getRatioTolerance();
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error("Failed to load image"));
          img.src = src;
        });
      }

      function handleImageUpload(event) {
        const files = Array.from(event.target.files);
        event.target.value = "";
        if (!files.length) return;

        const defaultDelay = Math.max(
          10,
          parseInt(document.getElementById("defaultDelay").value) || 500
        );
        let skipped = 0;
        let loaded = 0;

        files.forEach((file) => {
          const src = URL.createObjectURL(file);
          const img = new Image();

          img.onload = () => {
            const ratio = img.naturalWidth / img.naturalHeight;
            if (detectedRatio === null) detectedRatio = ratio;

            if (!sameRatio(ratio, detectedRatio)) {
              skipped++;
              URL.revokeObjectURL(src);
            } else {
              frames.push({
                src,
                delay: defaultDelay,
                name: file.name,
                customDelay: false,
                ratio
              });
            }

            if (++loaded === files.length) {
              renderFrameList();
              if (skipped > 0) {
                const tolPct = Math.round(getRatioTolerance() * 100);
                showStatus(
                  `${skipped} image(s) skipped — aspect ratio too different from ${ratioLabel(detectedRatio)} (tolerance ±${tolPct}%).`,
                  "warning"
                );
              } else {
                hideStatus();
              }
            }
          };

          img.onerror = () => {
            skipped++;
            if (++loaded === files.length) renderFrameList();
          };

          img.src = src;
        });
      }

      function ratioLabel(r) {
        const common = [
          [16, 9],
          [4, 3],
          [3, 2],
          [1, 1],
          [2, 3],
          [3, 4],
          [9, 16]
        ];
        for (const [w, h] of common) {
          if (Math.abs(r - w / h) < 0.05) return `${w}:${h}`;
        }
        return r.toFixed(2);
      }

      function recalcDetectedRatio() {
        detectedRatio = frames.length ? frames[0].ratio : null;
      }

      let dragSrcIndex = null;

      function renderFrameList() {
        recalcDetectedRatio();

        const list = document.getElementById("frameList");
        list.innerHTML = "";
        document.getElementById("clearAllBtn").disabled = !frames.length;

        if (!frames.length) return;

        frames.forEach((frame, i) => {
          const card = document.createElement("div");
          card.className = "frame-card";
          card.draggable = true;

          card.addEventListener("dragstart", () => {
            dragSrcIndex = i;
            card.classList.add("dragging");
          });
          card.addEventListener("dragend", () => {
            card.classList.remove("dragging");
          });
          card.addEventListener("dragover", (e) => {
            e.preventDefault();
            card.classList.add("drag-over");
          });
          card.addEventListener("dragleave", () => {
            card.classList.remove("drag-over");
          });
          card.addEventListener("drop", (e) => {
            e.preventDefault();
            card.classList.remove("drag-over");
            if (dragSrcIndex === null || dragSrcIndex === i) return;
            const [moved] = frames.splice(dragSrcIndex, 1);
            const targetIndex = dragSrcIndex < i ? i - 1 : i;
            frames.splice(targetIndex, 0, moved);
            dragSrcIndex = null;
            renderFrameList();
          });

          const dragHandle = el("span", "drag-handle", "⠿");

          const idx = el("span", "frame-index", String(i + 1));

          const thumb = document.createElement("img");
          thumb.className = "frame-thumb";
          thumb.src = frame.src;
          thumb.alt = "";

          const name = el("div", "frame-name", frame.name);

          const delayWrap = document.createElement("div");
          delayWrap.className = "frame-delay";
          delayWrap.appendChild(el("span", "", "Delay:"));
          const delayInput = document.createElement("input");
          delayInput.type = "number";
          delayInput.min = "10";
          delayInput.max = "60000";
          delayInput.value = frame.delay;
          delayInput.addEventListener("change", () => {
            frames[i].delay = Math.max(10, parseInt(delayInput.value) || 500);
            frames[i].customDelay = true;
            delayInput.value = frames[i].delay;
          });
          delayWrap.appendChild(delayInput);
          delayWrap.appendChild(el("span", "", "ms"));

          const actions = document.createElement("div");
          actions.className = "frame-actions";

          const upBtn = document.createElement("button");
          upBtn.className = "btn-icon";
          upBtn.textContent = "↑";
          upBtn.title = "Move up";
          upBtn.disabled = i === 0;
          upBtn.onclick = () => {
            swap(i - 1, i);
            renderFrameList();
          };

          const downBtn = document.createElement("button");
          downBtn.className = "btn-icon";
          downBtn.textContent = "↓";
          downBtn.title = "Move down";
          downBtn.disabled = i === frames.length - 1;
          downBtn.onclick = () => {
            swap(i, i + 1);
            renderFrameList();
          };

          const removeBtn = document.createElement("button");
          removeBtn.className = "btn-remove";
          removeBtn.textContent = "×";
          removeBtn.title = "Remove";
          removeBtn.onclick = () => {
            URL.revokeObjectURL(frame.src);
            frames.splice(i, 1);
            renderFrameList();
          };

          actions.append(upBtn, downBtn, removeBtn);
          card.append(dragHandle, idx, thumb, name, delayWrap, actions);
          list.appendChild(card);
        });
      }

      function swap(a, b) {
        [frames[a], frames[b]] = [frames[b], frames[a]];
      }

      function clearAllFrames() {
        frames.forEach((f) => URL.revokeObjectURL(f.src));
        frames = [];
        renderFrameList();
        hideStatus();
      }

      function el(tag, className, text) {
        const e = document.createElement(tag);
        if (className) e.className = className;
        if (text != null) e.textContent = text;
        return e;
      }

      // Center-crop src image onto canvas at target dimensions, preserving content
      function drawCropped(ctx, img, targetW, targetH) {
        const imgRatio = img.naturalWidth / img.naturalHeight;
        const targetRatio = targetW / targetH;
        let sx, sy, sw, sh;
        if (imgRatio > targetRatio) {
          // Image is wider than target — crop left/right
          sh = img.naturalHeight;
          sw = sh * targetRatio;
          sx = (img.naturalWidth - sw) / 2;
          sy = 0;
        } else {
          // Image is taller than target — crop top/bottom
          sw = img.naturalWidth;
          sh = sw / targetRatio;
          sx = 0;
          sy = (img.naturalHeight - sh) / 2;
        }
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
      }

      // Fit src image inside canvas at target dimensions without cropping,
      // filling the surrounding area with bgColor (letterbox/pillarbox).
      function drawFitted(ctx, img, targetW, targetH, bgColor) {
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, targetW, targetH);

        const imgRatio = img.naturalWidth / img.naturalHeight;
        const targetRatio = targetW / targetH;
        let dw, dh, dx, dy;
        if (imgRatio > targetRatio) {
          dw = targetW;
          dh = dw / imgRatio;
          dx = 0;
          dy = (targetH - dh) / 2;
        } else {
          dh = targetH;
          dw = dh * imgRatio;
          dy = 0;
          dx = (targetW - dw) / 2;
        }
        ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight, dx, dy, dw, dh);
      }

      async function makeGif() {
        if (!frames.length) {
          showStatus("Add at least one image.", "error");
          return;
        }

        showStatus("Rendering…", "info");
        document.getElementById("previewContainer").innerHTML =
          '<div class="empty-preview">Rendering…</div>';

        try {
          const maxDim = parseInt(document.getElementById("gifSize").value);

          const firstImg = await loadImage(frames[0].src);
          const ratio = firstImg.naturalWidth / firstImg.naturalHeight;
          const [w, h] =
            ratio >= 1
              ? [maxDim, Math.round(maxDim / ratio)]
              : [Math.round(maxDim * ratio), maxDim];

          const imgs = await Promise.all(frames.map((f) => loadImage(f.src)));

          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");

          const fitMode =
            getRatioTolerance() > 0
              ? document.getElementById("fitMode").value
              : "crop";
          const padColor = getPadColor();

          const gif = new GIF({
            workers: 2,
            quality: 10,
            width: w,
            height: h,
            repeat: getRepeat(),
            workerScript: await getWorkerBlobUrl()
          });

          imgs.forEach((img, i) => {
            ctx.clearRect(0, 0, w, h);
            if (fitMode === "pad") {
              drawFitted(ctx, img, w, h, padColor);
            } else {
              drawCropped(ctx, img, w, h);
            }
            gif.addFrame(ctx, { copy: true, delay: frames[i].delay });
          });

          gif.on("finished", (blob) => {
            if (gifBlobUrl) URL.revokeObjectURL(gifBlobUrl);
            gifBlobUrl = URL.createObjectURL(blob);
            const container = document.getElementById("previewContainer");
            container.innerHTML = "";
            const img = document.createElement("img");
            img.src = gifBlobUrl;
            container.appendChild(img);
            showStatus(
              `Done — ${frames.length} frame(s), ${w}×${h} px.`,
              "success"
            );
          });

          gif.on("error", (err) => showStatus("Render error: " + err, "error"));

          gif.render();
        } catch (e) {
          showStatus("Error: " + e.message, "error");
        }
      }

      function downloadGif() {
        if (!gifBlobUrl) {
          showStatus("Render a GIF first.", "error");
          return;
        }
        const a = document.createElement("a");
        a.href = gifBlobUrl;
        a.download = "output.gif";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }

      function showStatus(msg, type) {
        const el = document.getElementById("statusMsg");
        el.textContent = msg;
        el.className = "status " + type;
      }

      function hideStatus() {
        document.getElementById("statusMsg").className = "status hidden";
      }
    </script>
  </body>
</html>
